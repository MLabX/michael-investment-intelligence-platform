name: Antenna Daily Discovery Brief

on:
  schedule:
    # 20:00 UTC ≈ 06:00 AEST / 07:00 AEDT next calendar day in Sydney.
    # GitHub cron is best-effort and does NOT adjust for DST automatically.
    # During AEDT (Oct–Apr) brief arrives ~07:00 Sydney; during AEST ~06:00.
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: antenna-daily
  cancel-in-progress: true  # avoid two runs racing to push the same branch

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: apps
      TZ: Australia/Sydney
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so rebase before push works reliably

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/antenna/requirements.txt

      - name: Generate discovery brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTENNA_MODEL: ${{ vars.ANTENNA_MODEL }}
        run: python -m antenna --verbose

      - name: Commit brief and dedup state
        run: |
          git config user.name  "antenna-bot"
          git config user.email "antenna-bot@users.noreply.github.com"

          git add -f reports/discovery/daily/*.md data/antenna/seen.json
          if git diff --cached --quiet; then
            echo "No brief changes to commit."
            exit 0
          fi

          git commit -m "Antenna: discovery brief $(TZ=Australia/Sydney date +%Y-%m-%d)"

          # Remote may have moved (manual push, prior run, or race). Rebase and retry.
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
